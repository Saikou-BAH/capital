[theme]
base                   = "light"
primaryColor           = "#1D4ED8"
backgroundColor        = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor              = "#0F172A"
font                   = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
